# Benchopt configuration for the workflow simulated stream benchmark.

objective:
  - streaming_reconstruction_objective

dataset:
  - single_image_blur_stream:
      image_size: 256
      blur_sigma: 2.0
      noise_level: 0.01
      stream_length: 64
      rate_hz: 0.0
      queue_capacity: 4
      seed: 42

solver:
  - PnPStreamSimAIBench:
      orchestrator_name: ["process-pool", "ray"]
      server_type: ["filesystem", "redis"]
      device: cpu
      ncpus: 2
      ngpus: 0
      batch_size: 1
      inner_iterations: 1
      step_size: 0.8
      denoiser_sigma: 0.05
      denoiser_kernel_size: 3
      denoiser_lambda_relaxation: null
      poll_interval_s: 0.01

max-runs: 1
n-repetitions: 1
plot: false
html: false
