name: Main CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BENCHOPT_DEBUG: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: uv sync --group test

      - name: Test benchmark inference
        run: |
          uv run benchopt run benchmark_inference/. \
            --config benchmark_inference/configs/ci_smoke.yml \
            --max-runs 1 \
            --n-repetitions 1 \
            --no-plot \
            --no-html \
            --no-display

      - name: Test benchmark workflow
        run: |
          uv run benchopt run benchmark_workflows/. \
            --max-runs 1 \
            --n-repetitions 1 \
            --no-plot \
            --no-html \
            --no-display
