objective:
  - reconstruction_objective

# Dataset
dataset:
  - tomography_3d_train:
      num_projs: [[30, 50, 100]]
      max_train_samples: null
      max_val_samples: null
      batch_size: 1


# Solver
solver:
  - UnrolledPnP:
      denoiser: drunet
      n_iter: 3
      init_stepsize: 0.9
      denoiser_sigma: 0.03
      model_learning_rate: 1e-4
      grad_accumulation_steps: 12
      use_profiler: false
      train_algo_params: false
      use_x_init: true
      clip_grad_norm: 1e-2
      lr_decay_rate: 0.7     # exponential decay per epoch; 0 = constant LR
      lr_min: 5e-6           # LR floor
      slurm_gres, slurm_ntasks_per_node, slurm_nodes,distribute_model, patch_size, overlap, max_batch_size: [
        ["gpu:4", 4, 8, true, [128, 128, 128], [16, 16, 16], 1],   
      ]   


# Run parameters
max-runs: 30
n-repetitions: 1
